<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark blue background circle -->
  <circle cx="50" cy="50" r="50" fill="#003D7A"/>

  <!-- Mickey Mouse ears (two smaller circles on top) -->
  <circle cx="32" cy="38" r="16" fill="white"/>
  <circle cx="68" cy="38" r="16" fill="white"/>

  <!-- Mickey head (larger circle, centered lower) -->
  <circle cx="50" cy="62" r="22" fill="white"/>

  <!-- Sparkle 1 — top right -->
  <g transform="translate(80, 18)" fill="white">
    <polygon points="0,-6 1.5,-1.5 6,0 1.5,1.5 0,6 -1.5,1.5 -6,0 -1.5,-1.5" opacity="0.95"/>
  </g>

  <!-- Sparkle 2 — top left -->
  <g transform="translate(16, 14)" fill="white">
    <polygon points="0,-4.5 1.1,-1.1 4.5,0 1.1,1.1 0,4.5 -1.1,1.1 -4.5,0 -1.1,-1.1" opacity="0.85"/>
  </g>

  <!-- Sparkle 3 — right side -->
  <g transform="translate(90, 42)" fill="white">
    <polygon points="0,-3.5 0.9,-0.9 3.5,0 0.9,0.9 0,3.5 -0.9,0.9 -3.5,0 -0.9,-0.9" opacity="0.75"/>
  </g>
</svg>
